<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Khadiza 💙</title>
  <meta name="description" content="A heartfelt birthday celebration for Khadiza – 19th May.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">


  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    :root {
      --bg: #050a12;
      --blue: #5eb8ff;
      --blue-l: #a0d8ff;
      --blue-d: #1e6aaa;
      --glow: rgba(94, 184, 255, 0.55);
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(94, 184, 255, 0.18);
      --text: #d5e8f5;
      --muted: #5a80a0;
      --r-card: 28px;
      --r-cell: 18px;
      --gap: 16px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(30, 80, 160, .22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 15%, rgba(94, 184, 255, .10) 0%, transparent 60%),
        radial-gradient(ellipse 45% 40% at 50% 95%, rgba(20, 60, 130, .12) 0%, transparent 60%);
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── SPARKLE STARFIELD ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 7% 13%, rgba(255, 255, 255, .6) 0%, transparent 100%),
        radial-gradient(1px 1px at 21% 38%, rgba(255, 255, 255, .4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 36% 7%, rgba(160, 210, 255, .65) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 70%, rgba(255, 255, 255, .45) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 24%, rgba(160, 210, 255, .50) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 87%, rgba(255, 255, 255, .35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 53%, rgba(160, 210, 255, .55) 0%, transparent 100%),
        radial-gradient(1px 1px at 13% 79%, rgba(255, 255, 255, .40) 0%, transparent 100%),
        radial-gradient(1px 1px at 43% 91%, rgba(160, 210, 255, .45) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 47%, rgba(255, 255, 255, .30) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 63%, rgba(94, 184, 255, .70) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 74% 11%, rgba(160, 210, 255, .60) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 37%, rgba(255, 255, 255, .50) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 28%, rgba(255, 255, 255, .35) 0%, transparent 100%),
        radial-gradient(2px 2px at 17% 55%, rgba(94, 184, 255, .55) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% {
        opacity: .7;
      }

      100% {
        opacity: 1;
      }
    }

    /* ── FLOATING BUTTERFLIES ── */
    .bf-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .bf {
      position: absolute;
      bottom: -120px;
      font-size: 36px;
      opacity: 0;
      animation: bf-rise var(--dur, 18s) var(--delay, 0s) ease-in-out infinite;
      filter:
        drop-shadow(0 0 10px rgba(94, 184, 255, .95)) drop-shadow(0 0 26px rgba(94, 184, 255, .60)) drop-shadow(0 0 42px rgba(30, 100, 200, .40));
    }

    @keyframes bf-rise {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0px) rotate(0deg) scale(.7);
      }

      8% {
        opacity: .85;
      }

      42% {
        transform: translateY(-50vh) translateX(55px) rotate(18deg) scale(1.2);
      }

      90% {
        opacity: .8;
      }

      100% {
        opacity: 0;
        transform: translateY(-115vh) translateX(-35px) rotate(-12deg) scale(.9);
      }
    }

    .bf:nth-child(1) {
      left: 5%;
      --dur: 20s;
      --delay: 0s;
      font-size: 32px;
    }

    .bf:nth-child(2) {
      left: 18%;
      --dur: 25s;
      --delay: 4s;
      font-size: 24px;
    }

    .bf:nth-child(3) {
      left: 34%;
      --dur: 18s;
      --delay: 8s;
      font-size: 38px;
    }

    .bf:nth-child(4) {
      left: 52%;
      --dur: 22s;
      --delay: 2s;
      font-size: 28px;
    }

    .bf:nth-child(5) {
      left: 70%;
      --dur: 19s;
      --delay: 6s;
      font-size: 34px;
    }

    .bf:nth-child(6) {
      left: 85%;
      --dur: 26s;
      --delay: 10s;
      font-size: 22px;
    }

    .bf:nth-child(7) {
      left: 42%;
      --dur: 21s;
      --delay: 14s;
      font-size: 30px;
    }

    .bf:nth-child(8) {
      left: 62%;
      --dur: 17s;
      --delay: 11s;
      font-size: 26px;
    }

    /* scale the Apple emoji img with the parent font-size */
    .bf img {
      width: 1em;
      height: 1em;
      display: block;
      pointer-events: none;
      user-select: none;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Apple emoji img inline in headings/text */
    .apple-emoji {
      height: 0.85em;
      width: auto;
      vertical-align: middle;
      margin-left: 0.08em;
      display: inline-block;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 940px;
      padding: 64px 22px 100px;
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    /* ── GLASS BASE ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      box-shadow:
        0 30px 65px rgba(0, 0, 0, .75),
        0 0 60px rgba(94, 184, 255, .07),
        inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    /* ── MESSAGE CARD ── */
    .msg-card {
      border-radius: var(--r-card);
      padding: 62px 52px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform .4s ease, box-shadow .4s ease;
    }

    .msg-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-d), var(--blue), var(--blue-l), transparent);
      opacity: .8;
    }

    .msg-card::after {
      content: '';
      position: absolute;
      top: 14px;
      right: 20px;
      width: 130px;
      height: 130px;
      background:
        radial-gradient(2px 2px at 20% 30%, rgba(94, 184, 255, .8) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 15%, rgba(160, 220, 255, .6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 65%, rgba(255, 255, 255, .5) 0%, transparent 100%),
        radial-gradient(2px 2px at 40% 80%, rgba(94, 184, 255, .65) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255, 255, 255, .4) 0%, transparent 100%);
      pointer-events: none;
      opacity: .9;
    }

    .msg-card:hover {
      transform: translateY(-6px);
      box-shadow:
        0 40px 75px rgba(0, 0, 0, .8),
        0 0 70px rgba(94, 184, 255, .18),
        inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    .msg-name {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      font-weight: 200;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0 22px var(--blue),
        0 0 50px rgba(94, 184, 255, .55),
        0 0 90px rgba(30, 100, 200, .30);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .msg-date {
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--blue-l);
      text-shadow: 0 0 18px rgba(94, 184, 255, .8);
      margin-bottom: 28px;
    }

    .msg-divider {
      width: 72px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--blue-d), var(--blue), var(--blue-l), transparent);
      border: none;
      margin: 0 auto 30px;
      border-radius: 99px;
    }

    .msg-story {
      font-size: clamp(1.05rem, 2.4vw, 1.2rem);
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      max-width: 660px;
      margin: 0 auto;
      min-height: 60px;
      transition: opacity .5s ease, transform .5s ease;
      will-change: opacity, transform;
    }

    .msg-story.out {
      opacity: 0;
      transform: translateY(10px);
    }

    .msg-story.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── GRID SECTION ── */
    .grid-wrap {
      border-radius: var(--r-card);
      padding: var(--gap);
      position: relative;
      overflow: hidden;
    }

    .grid-hint {
      text-align: center;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      opacity: .7;
    }

    .grid-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--blue-l), transparent);
      opacity: .5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    /* ── CELLS ── */
    .cell {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--r-cell);
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .65);
      transition: transform .32s ease, box-shadow .32s ease;
    }

    .cell:hover {
      transform: scale(1.028);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, .72),
        0 0 32px rgba(94, 184, 255, .28),
        0 0 60px rgba(30, 100, 200, .14);
    }

    .cell::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-cell);
      box-shadow: inset 0 0 0 1.5px rgba(94, 184, 255, .0);
      transition: box-shadow .32s ease;
      pointer-events: none;
      z-index: 5;
    }

    .cell:hover::after {
      box-shadow: inset 0 0 0 1.5px rgba(94, 184, 255, .45);
    }

    /* ── TWO-LAYER CROSSFADE ── */
    .layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.0s ease-in-out;
      pointer-events: none;
    }

    .layer.show {
      opacity: 1;
      z-index: 2;
    }

    .layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(.88) contrast(1.06) saturate(1.1);
      transition: transform 12s ease;
    }

    .layer.show img {
      transform: scale(1.06);
    }

    /* ── CROWN MARKER ── */
    .cell.crown::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      width: 22px;
      height: 22px;
      background-image: url('https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f499.png');
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 10;
      filter: drop-shadow(0 0 8px rgba(94, 184, 255, .95));
      animation: pulse-crown 2s ease-in-out infinite;
    }

    @keyframes pulse-crown {

      0%,
      100% {
        transform: scale(1);
        opacity: .9;
      }

      50% {
        transform: scale(1.25);
        opacity: 1;
      }
    }

    /* ── BGM PLAYER ── */
    #bgm-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid var(--blue);
      background: rgba(5, 15, 35, .85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 18px rgba(94, 184, 255, .55),
        0 0 40px rgba(94, 184, 255, .25),
        0 8px 24px rgba(0, 0, 0, .6);
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
      outline: none;
    }

    #bgm-btn:hover {
      transform: scale(1.1);
      box-shadow:
        0 0 26px rgba(94, 184, 255, .75),
        0 0 55px rgba(94, 184, 255, .40),
        0 10px 30px rgba(0, 0, 0, .65);
      background: rgba(20, 60, 140, .80);
    }

    #bgm-btn svg {
      width: 26px;
      height: 26px;
      fill: var(--blue-l);
      transition: fill .2s ease;
    }

    /* spinning vinyl ring when playing */
    #bgm-btn.playing {
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes pulse-ring {

      0%,
      100% {
        box-shadow: 0 0 18px rgba(94, 184, 255, .55), 0 0 40px rgba(94, 184, 255, .25), 0 8px 24px rgba(0, 0, 0, .6);
      }

      50% {
        box-shadow: 0 0 28px rgba(94, 184, 255, .85), 0 0 65px rgba(94, 184, 255, .50), 0 8px 24px rgba(0, 0, 0, .6);
      }
    }

    /* note tooltip */
    #bgm-label {
      position: fixed;
      bottom: 95px;
      right: 28px;
      z-index: 999;
      background: rgba(5, 15, 35, .90);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 13px;
      font-size: .72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--blue-l);
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .3s ease, transform .3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #bgm-btn:hover~#bgm-label,
    #bgm-label.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      .msg-card {
        padding: 46px 22px;
      }

      .grid-wrap {
        padding: 10px;
      }

      :root {
        --gap: 10px;
        --r-cell: 12px;
        --r-card: 20px;
      }

      #bgm-btn {
        width: 50px;
        height: 50px;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Butterflies (Apple iOS emoji) -->
  <div class="bf-layer" aria-hidden="true">
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
    <div class="bf"><img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f98b.png" alt="🦋">
    </div>
  </div>

  <!-- BGM Audio -->
  <audio id="bgm" loop preload="none">
    <source src="assets/bgm.mp3" type="audio/mpeg">
  </audio>

  <!-- BGM Toggle Button -->
  <button id="bgm-btn" aria-label="Toggle background music" title="Toggle BGM">
    <!-- Play icon (default) -->
    <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 5v14l11-7z" />
    </svg>
    <!-- Pause icon (hidden by default) -->
    <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
    </svg>
  </button>
  <div id="bgm-label">🎵 Birthday BGM</div>

  <main class="page">

    <!-- Message Card -->
    <section class="msg-card glass" aria-label="Birthday message">
      <h1 class="msg-name">Khadiza <img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple/img/apple/64/1f499.png"
          alt="💙" class="apple-emoji"></h1>
      <p class="msg-date">19th May</p>
      <hr class="msg-divider" aria-hidden="true">
      <p class="msg-story in" id="story-text"></p>
    </section>

    <!-- 2×2 Photo Grid -->
    <section class="grid-wrap glass" aria-label="Photo grid">
      <p class="grid-hint">✦ tap a photo ✦</p>
      <div class="grid" id="photo-grid">
        <div class="cell crown" id="c0"></div>
        <div class="cell" id="c1"></div>
        <div class="cell" id="c2"></div>
        <div class="cell" id="c3"></div>
      </div>
    </section>

  </main>

  <script>
    /* ── DATA ── */
    const IMGS = [
      { url: 'img/img1.png', alt: 'Khadiza photo 1', story: 'Go wild, Khadiza! 🎉' },
      { url: 'img/img2.png', alt: 'Khadiza photo 2', story: 'Shine like a star ✨' },
      { url: 'img/img3.png', alt: 'Khadiza photo 3', story: '19th May – your day 💙' },
      { url: 'img/img4.png', alt: 'Khadiza photo 4', story: 'You are so loved 🦋' }
    ];

    /* ── DOM ── */
    const cells = [0, 1, 2, 3].map(i => document.getElementById(`c${i}`));
    const storyEl = document.getElementById('story-text');

    /* Build 2-layer crossfade DOM per cell */
    cells.forEach(cell => {
      [0, 1].forEach(i => {
        const d = document.createElement('div');
        d.className = 'layer' + (i === 0 ? ' show' : '');
        const img = document.createElement('img');
        img.alt = '';
        d.appendChild(img);
        cell.appendChild(d);
      });
    });

    let order = [0, 1, 2, 3];
    let autoTimer = null;

    function nextOrder(current) {
      return current.map(v => (v + 1) % IMGS.length);
    }

    function paintDirect(ord) {
      cells.forEach((cell, ci) => {
        const data = IMGS[ord[ci]];
        const show = cell.querySelector('.layer.show');
        show.querySelector('img').src = data.url;
        show.querySelector('img').alt = data.alt;
      });
    }

    function crossfade(ord) {
      cells.forEach((cell, ci) => {
        const data = IMGS[ord[ci]];
        const layers = cell.querySelectorAll('.layer');
        const hidden = Array.from(layers).find(l => !l.classList.contains('show'));
        hidden.querySelector('img').src = data.url;
        hidden.querySelector('img').alt = data.alt;
        requestAnimationFrame(() => {
          layers.forEach(l => l.classList.toggle('show'));
        });
      });
    }

    function updateCrown() {
      cells.forEach((c, i) => c.classList.toggle('crown', i === 0));
    }

    let storyTimeout = null;
    function setStory(imgIndex) {
      storyEl.classList.remove('in');
      storyEl.classList.add('out');
      clearTimeout(storyTimeout);
      storyTimeout = setTimeout(() => {
        storyEl.textContent = IMGS[imgIndex].story;
        storyEl.classList.remove('out');
        storyEl.offsetHeight;
        storyEl.classList.add('in');
      }, 520);
    }

    function doShuffle() {
      order = nextOrder(order);
      crossfade(order);
      updateCrown();
      setStory(order[0]);
    }

    function startTimer() {
      clearInterval(autoTimer);
      autoTimer = setInterval(doShuffle, 5000);
    }

    cells.forEach((cell, ci) => {
      cell.addEventListener('click', () => setStory(order[ci]));
    });

    paintDirect(order);
    updateCrown();
    storyEl.textContent = IMGS[order[0]].story;
    startTimer();


    /* ── BGM PLAYER ── */
    const bgmAudio = document.getElementById('bgm');
    const bgmBtn = document.getElementById('bgm-btn');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const bgmLabel = document.getElementById('bgm-label');
    let bgmPlaying = false;

    function setBgmState(playing) {
      bgmPlaying = playing;
      iconPlay.style.display = playing ? 'none' : '';
      iconPause.style.display = playing ? '' : 'none';
      bgmBtn.classList.toggle('playing', playing);
      bgmLabel.textContent = playing ? '🎵 Now Playing' : '🎵 Birthday BGM';

      // flash label briefly
      bgmLabel.classList.add('show');
      clearTimeout(bgmLabelTimer);
      bgmLabelTimer = setTimeout(() => bgmLabel.classList.remove('show'), 2200);
    }

    let bgmLabelTimer = null;

    bgmBtn.addEventListener('click', () => {
      if (bgmPlaying) {
        bgmAudio.pause();
        setBgmState(false);
      } else {
        bgmAudio.play().then(() => setBgmState(true)).catch(() => {
          bgmLabel.textContent = '⚠ No BGM file found';
          bgmLabel.classList.add('show');
          clearTimeout(bgmLabelTimer);
          bgmLabelTimer = setTimeout(() => bgmLabel.classList.remove('show'), 3000);
        });
      }
    });

    bgmAudio.addEventListener('ended', () => setBgmState(false));
  </script>
</body>

</html>
